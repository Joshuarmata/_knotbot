bio: |
  KnotBot is an autonomous robotic system that ties knots using a UR7e 6-DOF robot arm.
  The system uses real-time computer vision, ROS2, and visual servoing to guide a robot
  through a six-phase knot-tying sequence (steps 0–5) on colored rope.

