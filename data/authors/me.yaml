# How It Works: steps 0–6. Optional `image` (site-relative or absolute URL), `video` (YouTube).
experience:
  - role: "Step 0 — Set"
    org: "Initial rope layout on the workspace"
    skip_dates: true
    image: media/how-it-works/step-0-set.png
    image_alt: "Diagram: colored rope segments before and after the initial set configuration"
    video: "https://youtube.com/shorts/4NHGYzXnru4?feature=share"
    summary: |
      The rope starts in a staged layout with green, yellow, blue, and red tape landmarks.
      This phase establishes the baseline geometry before crossing and grasp motions.
      A full-frame classifier (same RealSense view used for visual servoing) should read <code>step0</code> here; the <code>rope_knot_infer</code> HUD shows confidence plus a rope-mask heuristic score.
  - role: "Step 1 — Cross"
    org: "Visual Perception — Color Detection + Depth Estimation"
    skip_dates: true
    image: media/how-it-works/step-1-cross.png
    image_alt: "Diagram: crossing the red rope end over the body of the rope"
    video: "https://youtu.be/QGwxxTDsUf4"
    summary: |
      The camera detects four colored tape landmarks (yellow, red, green, blue) on the
      workspace using HSV filtering. Depth values from the aligned RealSense depth stream
      are used to localize each color blob in 3D (base_link frame). An ArUco marker
      calibrates the table-plane Z to compensate for IR absorption by colored tape.
      The robot computes the target crossing point: the projection of the yellow rope
      tip onto the perpendicular bisector of the green–blue line.
      In parallel, knot-step perception labels the frame as <code>step1</code> when the rope has crossed—matching the geometric crossing target used by the controller.
  - role: "Step 2 — Flip"
    org: "Grasp Planning — SVD Best-Fit + Reflection Geometry"
    skip_dates: true
    image: media/how-it-works/step-2-flip.png
    image_alt: "Diagram: flipping the rope loop configuration"
    video: "https://youtube.com/shorts/NT93a8iIzBE?feature=share"
    summary: |
      The system finds the yellow rope point farthest from the green–blue reference line.
      SVD best-fit over all yellow pixel positions determines the rope's tangent direction
      so the gripper can align perpendicular to the rope for a reliable grasp.
      The drop goal is computed as a pure geometric reflection of the grasp point across
      the green–blue reference line, placing the rope on the opposite side.
  - role: "Step 3 — Form the Loop"
    org: "Loop Formation — Perpendicular Bisector Reflection"
    skip_dates: true
    video: "https://youtube.com/shorts/ZJo2v69Jv0A?feature=share"
    summary: |
      The blue rope centroid is reflected across the perpendicular bisector of the
      green–red segment. This creates the open loop structure needed for the rope
      end to pass through and complete the overhand knot topology.
  - role: "Step 4 — Center"
    org: "Threading — Line Intersection Targeting"
    skip_dates: true
    image: media/how-it-works/step-4-center.png
    image_alt: "Diagram: moving the rope end into the center of the loop"
    video: "https://youtube.com/shorts/pujQQuupZSc?feature=share"
    summary: |
      The target is the intersection of two lines: the bisector through the blue
      centroid (perpendicular to the blue best-fit direction) and the perpendicular
      from the farthest yellow point to the green–red segment. This intersection
      positions the gripper to thread the rope end through the formed loop.
  - role: "Step 5 — Flip (part 2)"
    org: "Late-stage loop reorientation"
    skip_dates: true
    image: media/how-it-works/step-5-flip-part-2.png
    image_alt: "Diagram: second flip of the loop before final pull"
    summary: |
      The gripper continues reorienting the loop so the rope topology matches the
      tightened overhand knot. The robot moves toward the midpoint between the blue and
      yellow rope centroids to draw both segments toward the center before the final pull.
  - role: "Step 6 — Pull"
    org: "Tighten, final tuck, and release"
    skip_dates: true
    image: media/how-it-works/step-6-pull.png
    image_alt: "Diagram: pulling to tighten the knot and finishing the motion"
    video: "https://youtube.com/shorts/wegP1dggHmc"
    summary: |
      The gripper moves to a point projected along the averaged direction of the
      red→blue and green→blue vectors, at a distance equal to the total span of the rope
      geometry. The rope is released, completing the knot. Force/torque feedback from the
      robot's wrist sensor confirms rope tension.

